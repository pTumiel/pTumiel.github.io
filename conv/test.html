<!DOCTYPE html>
<html>
  <head>
    <title>Under Construction</title>
    <style>
      /* Set background color and text color */
      body {
        background-color: #f1f1f1;
        color: #333;
        font-family: sans-serif;
        text-align: center;
      }
      
      /* Add padding and border to container */
      #container {
        background-color: #fff;
        border: 1px solid #ddd;
        padding: 20px;
        margin: 50px auto;
        max-width: 600px;
      }
      
      /* Style the heading */
      h1 {
        font-size: 36px;
        margin: 0 0 20px;
      }
      
      /* Style the message */
      p {
        font-size: 24px;
        margin: 0 0 20px;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <h1>Under Construction</h1>
      <p>We're sorry, but this page is currently under construction.</p>
      <p>Please check back soon for updates.</p>
    </div>
  </body>
</html>
